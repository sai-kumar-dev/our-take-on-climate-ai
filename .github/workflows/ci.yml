name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: |
          python -m py_compile app.py app_ui.py train_model.py run_pipeline.py src/app_api_entry.py src/ui_app_source.py src/process_launcher.py src/project_doctor.py
      - name: Unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"
