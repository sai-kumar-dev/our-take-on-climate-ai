version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m streamlit run app_ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
